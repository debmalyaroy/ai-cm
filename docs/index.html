<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-CM Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .prose h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .prose h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #1e293b;
        }

        .prose p {
            margin-bottom: 1.25rem;
            line-height: 1.75;
            color: #475569;
        }

        .prose code {
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: monospace;
            font-size: 0.875em;
            color: #e11d48;
        }

        .prose pre {
            background: #0f172a;
            color: #f8fafc;
            padding: 1.25rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        /* Style for mermaid diagrams to ensure they look good in the prose container */
        .mermaid {
            background: white;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        .prose a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 500;
        }

        .prose a:hover {
            text-decoration: underline;
        }

        .prose ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1.25rem;
            color: #475569;
        }
    </style>
</head>

<body class="antialiased text-slate-900">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="../" class="text-xl font-bold text-brand-700 tracking-tight">AI-CM <span
                    class="text-slate-400 font-light">Docs</span></a>
            <a href="../" class="text-sm font-medium text-slate-600 hover:text-green-600"><i
                    class="fas fa-arrow-left mr-2"></i>Back to Report</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div id="content" class="prose bg-white border border-slate-200 rounded-3xl p-8 md:p-12 shadow-sm">
            <div class="flex items-center justify-center py-20 text-slate-400">
                <i class="fas fa-spinner fa-spin text-2xl mr-3"></i> Loading Documentation...
            </div>
        </div>
    </main>

    <script>
        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        async function loadDocs() {
            const container = document.getElementById('content');
            try {
                // Fetch README from root (one level up)
                const response = await fetch('../README.md');
                if (!response.ok) throw new Error('README.md not found');
                let markdown = await response.text();

                // FIX RELATIVE LINKS: 
                markdown = markdown.replace(/\]\(docs\//g, '](./');

                // Configure Marked to handle Mermaid code blocks
                const renderer = new marked.Renderer();
                const originalCodeRenderer = renderer.code.bind(renderer);

                renderer.code = function (code, language, escaped) {
                    if (language === 'mermaid') {
                        return `<div class="mermaid">${code}</div>`;
                    }
                    return originalCodeRenderer(code, language, escaped);
                };

                marked.setOptions({ renderer: renderer });

                // Render Markdown
                container.innerHTML = marked.parse(markdown);

                // Initialize Mermaid diagrams after the HTML is added to the DOM
                await mermaid.run();

            } catch (error) {
                container.innerHTML = `<div class="text-red-500">Error: ${error.message}</div>`;
            }
        }
        window.onload = loadDocs;
    </script>
</body>

</html>
