# AI-CM Backend Configuration - PRODUCTION
# Secrets (DATABASE_URL, AWS credentials) must be provided via environment variables.
# This file contains non-secret configuration only.

server:
  port: 8080
  read_timeout_sec: 30
  write_timeout_sec: 300 # LLM streaming calls can take up to 240s
  shutdown_sec: 10

database:
  # Overridden at runtime by DATABASE_URL env var if set, otherwise expands the variables below.
  # The value below requires sslmode=require for RDS.
  url: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@aicm-postgres.c3m6064k4csu.ap-south-1.rds.amazonaws.com:5432/${POSTGRES_DB:-aicm}?sslmode=require"
  max_conns: 20 # Conservative for RDS db.t3.micro (max_connections ~40)
  min_conns: 2
  max_conn_life_sec: 3600

llm:
  provider: "aws" # Use Amazon Bedrock for production
  temperature: 0.0 # Deterministic outputs for data analysis & SQL generation
  # Bedrock API region — Meta Llama models are hosted in us-east-1.
  # EC2 and RDS infrastructure are in ap-south-1 (Mumbai); that is set in .env [prod.aws] AWS_REGION.
  # These are two separate region settings for different purposes.
  aws_region: "us-east-1"
  # Global fallback model — used if an agent has no specific entry in agents below.
  # us.meta.llama3-1-70b-instruct-v1:0 is a cross-region inference profile (ap-south-1 → us-east-1).
  # Cost: $0.72/MTok input and $0.72/MTok output — ~14x cheaper than Claude 3.5 Sonnet.
  aws_model: "us.meta.llama3-1-70b-instruct-v1:0"

  # Agent-Specific Model Routing: all agents use Llama 3.1 70B for cost uniformity.
  # To upgrade individual agents, replace with us.meta.llama3-3-70b-instruct-v1:0 (Llama 3.3)
  # or apac.anthropic.claude-3-haiku-20240307-v1:0 (Claude Haiku, APAC native, $0.25/$1.25/MTok).
  agents:
    # Supervisor: Intent classification — any capable model works here.
    supervisor: "us.meta.llama3-1-70b-instruct-v1:0"

    # Analyst: Text-to-SQL + ReAct loop — Llama 70B achieves ~82% first-pass SQL success.
    analyst: "us.meta.llama3-1-70b-instruct-v1:0"

    # Strategist: Chain-of-Thought reasoning over gathered context.
    strategist: "us.meta.llama3-1-70b-instruct-v1:0"

    # Planner: Structured JSON output — ensure prompt enforces JSON format explicitly.
    planner: "us.meta.llama3-1-70b-instruct-v1:0"

    # Liaison: Professional email/report drafting.
    liaison: "us.meta.llama3-1-70b-instruct-v1:0"

    # Watchdog: Anomaly detection — mostly rule-based, LLM is a fallback only.
    watchdog: "us.meta.llama3-1-70b-instruct-v1:0"

logging:
  level: "info" # info for production; debug would expose SQL queries
  format: "json" # Structured JSON for CloudWatch / log aggregation

security:
  rate_limit_enabled: true
  rate_limit_per_minute: 20 # Stricter in production to protect Bedrock spend
  api_key_auth_enabled: false # Enable and set API_KEYS env var to lock down the API

cors:
  allow_origins:
    - "http://localhost:3000"   # local dev (Vite)
    - "http://localhost"        # nginx on port 80 (internal)
  # For production, override via CORS_ORIGINS env var in .env [prod.aws]
  # e.g. CORS_ORIGINS=http://localhost:3000,http://<your-ec2-dns-or-ip>
