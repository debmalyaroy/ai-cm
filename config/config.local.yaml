# AI-CM Backend Configuration - LOCAL
# Secrets (API keys) should be provided via environment variables or .env file

server:
  port: 8080
  read_timeout_sec: 30
  write_timeout_sec: 300
  shutdown_sec: 5

database:
  url: "postgres://aicm:aicm_secret@localhost:5432/aicm?sslmode=disable"
  max_conns: 10
  min_conns: 2
  max_conn_life_sec: 3600

llm:
  provider: "local"
  temperature: 0.0
  local_url: "http://localhost:11434/api/generate"
  local_model: "llama3.2"
  gemini_model: "gemini-2.0-flash"
  openai_model: "gpt-4o-mini"
  # gemini_api_key and openai_api_key should be set via env vars
  agent_models:
    supervisor: "llama3.2"
    analyst: "llama3.2" # Local models for local iteration
    planner: "llama3.2"
    strategist: "llama3.2"
    liaison: "llama3.2"
    watchdog: "llama3.2"

logging:
  level: "debug" # debug, info, warn, error
  format: "text" # json, text

cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
