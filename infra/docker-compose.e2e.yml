# docker-compose.e2e.yml
# E2E test stack: replaces Ollama with the lightweight mock LLM server.
# No GPU, no model downloads — fast cold start suitable for CI/CD.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d postgres llm-mock
#   cd ../src/backend && go test ./tests/... -v -count=1 -timeout 180s

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicm-e2e-postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  llm-mock:
    build:
      context: .
      dockerfile: Dockerfile.llm-mock
    container_name: aicm-e2e-llm-mock
    restart: "no"
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../src/backend
      dockerfile: ../../infra/Dockerfile.backend
    container_name: aicm-e2e-backend
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicm}
      PROMPT_DIR: "/app/prompts"
      CONFIG_PATH: "/app/config.yaml"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../src/prompts:/app/prompts:ro
      - ./config.e2e.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      llm-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
