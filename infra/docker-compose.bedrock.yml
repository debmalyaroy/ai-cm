services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicm"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../src/backend
      dockerfile: ../../infra/Dockerfile.backend
    container_name: aicm-backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicm}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      PROMPT_DIR: "/app/prompts"
      CONFIG_PATH: "/app/config.yaml"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../src/prompts:/app/prompts:ro
      - ../config/config.local.bedrock.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../src/apps/web
      dockerfile: ../../../infra/Dockerfile.frontend
    container_name: aicm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: aicm-nginx
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../index.html:/usr/share/nginx/html/project-summary.html:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
