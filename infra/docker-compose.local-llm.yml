version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aicm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - LLM_PROVIDER=local
      - LOCAL_LLM_URL=http://ollama:11434/api/generate
    volumes:
      - ../config/config.local.yaml:/app/config.local.yaml

volumes:
  ollama_data:
