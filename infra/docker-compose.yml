services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicm"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ../src/backend
      dockerfile: ../../infra/Dockerfile.backend
    container_name: aicm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aicm}:${POSTGRES_PASSWORD:-aicm_secret}@postgres:5432/${POSTGRES_DB:-aicm}?sslmode=disable
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BEDROCK_MODEL: ${AWS_BEDROCK_MODEL:-anthropic.claude-3-haiku-20240307-v1:0}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://ollama:11434/api/generate}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3}
      PORT: "8080"
      PROMPT_DIR: "/app/prompts"
      CONFIG_PATH: "/app/config.local.yaml"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../src/prompts:/app/prompts
      - ../config/config.local.yaml:/app/config.local.yaml
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ../src/apps/web
      dockerfile: ../../../infra/Dockerfile.frontend
    container_name: aicm-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  pgdata:
