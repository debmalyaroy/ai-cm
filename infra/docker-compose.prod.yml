# Production docker-compose — EC2 + RDS deployment.
# PostgreSQL is NOT containerised here; it runs on Amazon RDS.
# Secrets and parameters are injected at runtime via scripts/deploy.sh
#
# Images are pre-built and pushed to DockerHub (via Github CI or scripts/build.sh)
#
# Usage (triggered by scripts/deploy.sh):
#   docker-compose -f infra/docker-compose.prod.yml up -d

x-awslogs: &awslogs
  driver: awslogs
  options:
    awslogs-region: ${AWS_REGION:-ap-south-1}
    awslogs-group: /aicm/docker
    awslogs-create-group: "true"

services:
  backend:
    image: ${DOCKER_REGISTRY}/aicm-backend:latest
    container_name: aicm-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # Internal EC2 access only; external traffic goes via nginx on port 80
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PROMPT_DIR: "/app/prompts"
      CONFIG_PATH: "/app/config.yaml"
    volumes:
      - ../config/config.prod.yaml:/app/config.yaml:ro
      - ../src/prompts:/app/prompts:ro
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-group: /aicm/docker
        awslogs-stream: backend
        awslogs-create-group: "true"
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    image: ${DOCKER_REGISTRY}/aicm-frontend:latest
    container_name: aicm-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"  # Internal EC2 access only (nginx on port 80 serves external traffic)
    depends_on:
      - backend
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-group: /aicm/docker
        awslogs-stream: frontend
        awslogs-create-group: "true"
    deploy:
      resources:
        limits:
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: aicm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-group: /aicm/docker
        awslogs-stream: nginx
        awslogs-create-group: "true"
    depends_on:
      - frontend
      - backend

  # --- NEW LOG VIEWER SERVICE ---
  log-viewer:
    image: amir20/dozzle:latest
    container_name: aicm-log-viewer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4567:8080"
    # Optional: If you want to see the log-viewer's own logs in CloudWatch
#    logging:
#      <<: *awslogs
#      options:
#        awslogs-region: ${AWS_REGION:-ap-south-1}
#        awslogs-group: /aicm/docker
#        awslogs-stream: log-viewer
#        awslogs-create-group: "true"
