name: E2E Tests

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aicm
          POSTGRES_PASSWORD: aicm_secret
          POSTGRES_DB: aicm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: src/backend/go.sum

      - name: Initialize database
        run: |
          for f in $(ls infra/postgres/*.sql | sort); do
            echo "Applying $f ..."
            PGPASSWORD=aicm_secret psql -h localhost -U aicm -d aicm -f "$f" || true
          done

      - name: Build mock LLM binary
        run: |
          cd infra/llm-mock
          go build -o /tmp/llm-mock .

      - name: Start mock LLM
        run: |
          /tmp/llm-mock &
          # Wait until the mock server is accepting connections.
          # Binary starts in <1s so 30 retries is ample.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/health > /dev/null 2>&1; then
              echo "Mock LLM is ready after ${i}s."
              exit 0
            fi
            echo "Waiting for mock LLM... ($i/30)"
            sleep 1
          done
          echo "::error::Mock LLM did not start within 30 seconds"
          exit 1

      - name: Run E2E tests
        working-directory: ./src/backend
        env:
          DATABASE_URL: postgres://aicm:aicm_secret@localhost:5432/aicm?sslmode=disable
          LLM_PROVIDER: local
          LOCAL_LLM_URL: http://localhost:11434/api/generate
        run: go test ./tests/... -v -count=1 -timeout 180s
