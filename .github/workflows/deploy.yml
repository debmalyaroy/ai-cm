name: Deploy AI-CM to AWS

on:
  # Auto-deploy when CI pipeline completes successfully on master
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
  # Also allow manual deployment (e.g., to re-deploy without code changes)
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    # On workflow_run: only deploy if CI succeeded. On workflow_dispatch: always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Copy config files to EC2
        # Copies non-secret config and scripts (no .env.prod — that lives on EC2 only)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "infra/docker-compose.prod.yml,scripts/deploy_e2e.sh,src/prompts/,config/config.prod.yaml,infra/nginx.conf"
          target: "~/ai-cm"

      - name: SSH and Pull + Restart Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/ai-cm

            # Add DockerHub registry to env so docker-compose knows where to pull from
            if ! grep -q "^DOCKER_REGISTRY=" config/.env.prod; then
              echo "DOCKER_REGISTRY=${{ secrets.DOCKER_USERNAME }}" >> config/.env.prod
            else
              sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=${{ secrets.DOCKER_USERNAME }}|" config/.env.prod
            fi

            # Pull latest images from DockerHub (built by CI) then restart
            chmod +x scripts/deploy_e2e.sh
            ./scripts/deploy_e2e.sh prod
