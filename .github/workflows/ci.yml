name: CI

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: src/backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/apps/web/package-lock.json

      - name: Run backend unit tests
        working-directory: ./src/backend
        run: go test -v -coverprofile=coverage.out -covermode=atomic -skip 'E2E|e2e|EndToEnd' ./... -count=1 -timeout 120s

      - name: Install frontend dependencies
        working-directory: ./src/apps/web
        run: npm ci

      - name: Run frontend tests
        working-directory: ./src/apps/web
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/apps/web/package-lock.json

      - name: Generate Swagger
        working-directory: ./src/backend
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -d . --parseDependency --parseInternal

      - name: Download Go modules
        working-directory: ./src/backend
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: src/backend

      - name: Log in to Docker Hub
        # Only login if pulling/pushing images, the build.sh handles the push logic if -t prod is passed.
        # But to use GitHub Actions caching effectively, we log in here.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Execute Unified Build & Push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
        run: |
          chmod +x ./scripts/build.sh
          # Run the build script targeting production, which builds and pushes both images
          ./scripts/build.sh all -t prod
