name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Generate Swagger
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -d . --parseDependency --parseInternal

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56.2
          working-directory: src/backend

      - name: Run Tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Build
        run: |
          export CONFIG_PATH=../../config/config.local.yaml
          go build -v ./cmd/server

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
