name: CI

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/apps/web/package-lock.json

      - name: Generate Swagger
        working-directory: ./src/backend
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -d . --parseDependency --parseInternal

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56.2
          working-directory: src/backend

      - name: Log in to Docker Hub
        # Only login if pulling/pushing images, the build.sh handles the push logic if -t prod is passed.
        # But to use GitHub Actions caching effectively, we log in here.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Execute Unified Build & Push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost' }}
        run: |
          chmod +x ./scripts/build.sh
          # Run the build script targeting production, which builds and pushes both images
          ./scripts/build.sh all -t prod
